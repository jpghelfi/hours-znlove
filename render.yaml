# Render Blueprint — deploy the hours-tracker web app on the free tier.
# In Render: New + → Blueprint → connect this repo. Then set the secret env vars
# (marked sync:false) in the dashboard. Free instances sleep when idle and wake
# on the next request (~30–60s cold start) — fine for low traffic.
services:
  - type: web
    name: hours-znlove
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: NOTION_TOKEN
        sync: false
      - key: PROJECTS_DS_ID
        sync: false
      - key: TIME_ENTRIES_DS_ID
        sync: false
      - key: ALLOCATIONS_DS_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: WEEK_TARGET_HOURS
        value: "40"
      - key: NOTION_OAUTH_CLIENT_ID
        sync: false
      - key: NOTION_OAUTH_CLIENT_SECRET
        sync: false
      - key: NOTION_OAUTH_REDIRECT_URI
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
